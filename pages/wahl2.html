```html
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Briefwahl beantragen</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- LZString für QR-Dekomprimierung -->
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.info{
background:#eef3ff;
padding:12px;
border-radius:6px;
margin-bottom:20px;
font-size:14px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input{
width:100%;
padding:8px;
margin-top:4px;
border:1px solid #ccc;
border-radius:4px;
}

button{
margin-top:18px;
padding:10px;
border:none;
border-radius:5px;
background:#2f5cff;
color:white;
font-size:16px;
cursor:pointer;
width:100%;
}

button:hover{
background:#1f44c5;
}

.small{
font-size:13px;
color:#555;
margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<h1>Briefwahl beantragen</h1>

<div id="info" class="info">
Daten werden geladen...
</div>

<label>Vorname *</label>
<input id="vorname">

<label>Nachname *</label>
<input id="nachname">

<label>Personalnummer *</label>
<input id="pnr">

<label>Grund der Abwesenheit</label>
<input id="grund" placeholder="z.B. Urlaub / Krankheit / Dienstreise">

<div class="small">
* Pflichtfelder
</div>

<button onclick="sendMail()">Antrag per Mail senden</button>

<button onclick="downloadPDF()">PDF herunterladen</button>

</div>

<script>

let betrieb=""
let vorsitz=""
let anschrift=""
let email="wahlvorstand@firma.de"


document.addEventListener("DOMContentLoaded",function(){

const params=new URLSearchParams(window.location.search)

betrieb=params.get("betrieb")||betrieb
vorsitz=params.get("vorsitz")||vorsitz
anschrift=params.get("anschrift")||anschrift
email=params.get("email")||email


const packed=params.get("p")

if(packed){

try{

const json=LZString.decompressFromEncodedURIComponent(packed)

const data=JSON.parse(json||"{}")

betrieb=data.n||betrieb
vorsitz=data.v||vorsitz
anschrift=data.a||anschrift
email=data.e||email

}catch(e){

console.warn("QR Daten konnten nicht gelesen werden",e)

}

}


const info=document.getElementById("info")

info.innerHTML=`
<b>Betrieb:</b> ${betrieb}<br>
<b>Wahlvorstand:</b> ${vorsitz}<br>
<b>Anschrift:</b> ${anschrift}<br>
<b>E-Mail:</b> ${email}
`

})


function buildMailText(vorname,nachname,pnr,grund){

let grundText=grund
?`wegen ${grund}`
:"wegen Abwesenheit vom Betrieb"

return `Sehr geehrte Damen und Herren,

hiermit beantrage ich ${vorname} ${nachname} gemäß § 24 Absatz 1 Wahlordnung BetrVG
die schriftliche Stimmabgabe, da ich zum Zeitpunkt der Wahl ${grundText} verhindert bin.

Mit freundlichen Grüßen

${vorname} ${nachname}
Personalnummer: ${pnr}`

}


function sendMail(){

const vorname=document.getElementById("vorname").value.trim()
const nachname=document.getElementById("nachname").value.trim()
const pnr=document.getElementById("pnr").value.trim()
const grund=document.getElementById("grund").value.trim()

if(!vorname||!nachname||!pnr){

alert("Bitte alle Pflichtfelder ausfüllen")

return

}

const subject=`Briefwahlanforderung zur BR-Wahl - ${betrieb}`

const text=buildMailText(vorname,nachname,pnr,grund)

window.location.href=
`mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(text)}`

}


function downloadPDF(){

const vorname=document.getElementById("vorname").value.trim()
const nachname=document.getElementById("nachname").value.trim()
const pnr=document.getElementById("pnr").value.trim()
const grund=document.getElementById("grund").value.trim()

if(!vorname||!nachname||!pnr){

alert("Bitte alle Pflichtfelder ausfüllen")

return

}

const {jsPDF}=window.jspdf

const doc=new jsPDF()

const text=buildMailText(vorname,nachname,pnr,grund)

const lines=doc.splitTextToSize(text,180)

doc.text(lines,15,30)

doc.save("Briefwahl_Antrag.pdf")

}

</script>

</body>
</html>
```
